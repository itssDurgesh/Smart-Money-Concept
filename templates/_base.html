<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}XGB-SMC Terminal{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #000000;
            --surface: #0B0E14;
            --surface-2: #131722;
            --surface-3: #1D2026;
            --border: rgba(67, 70, 86, 0.25);
            --green: #00FF9D;
            --red: #FF1E56;
            --blue: #2962FF;
            --orange: #F7931A;
            --text: #D1D4DC;
            --muted: #787B86;
            --font: 'Inter', system-ui, sans-serif;
            --mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* === Sidebar === */
        .sidebar {
            width: 56px;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 4px;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sidebar .logo {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 700;
            color: var(--green);
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .nav-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            position: relative;
        }
        .nav-item:hover {
            background: var(--surface-2);
            color: var(--text);
        }
        .nav-item.active {
            background: rgba(41, 98, 255, 0.15);
            color: var(--blue);
            box-shadow: 0 0 12px rgba(41, 98, 255, 0.15);
        }
        .nav-item .material-icons-round { font-size: 22px; }
        .nav-item .tooltip {
            position: absolute;
            left: 52px;
            background: var(--surface-3);
            color: var(--text);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
            z-index: 999;
        }
        .nav-item:hover .tooltip { opacity: 1; }

        /* === Main Layout === */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* === Header === */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 44px;
            flex-shrink: 0;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-title {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            letter-spacing: 1.5px;
        }
        .header-title span {
            color: var(--muted);
            font-weight: 400;
            font-size: 10px;
            margin-left: 6px;
        }
        .header select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: #fff;
            padding: 4px 10px;
            font-family: var(--mono);
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }
        .header select:hover { border-color: var(--muted); }
        .header select:focus { border-color: var(--blue); }
        .btn-sync {
            background: rgba(41, 98, 255, 0.12);
            color: var(--blue);
            border: 1px solid rgba(41, 98, 255, 0.3);
            padding: 5px 14px;
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .btn-sync:hover { background: var(--blue); color: #fff; }

        /* === Content Area === */
        .content { flex: 1; overflow: hidden; }

        /* === Common Utilities === */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: 700;
            font-family: var(--mono);
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-buy { background: rgba(0,255,157,0.12); color: var(--green); border: 1px solid rgba(0,255,157,0.25); }
        .badge-sell { background: rgba(255,30,86,0.12); color: var(--red); border: 1px solid rgba(255,30,86,0.25); }
        .badge-pending { background: rgba(245,158,11,0.12); color: #F59E0B; }
        .badge-active { background: rgba(41,98,255,0.12); color: var(--blue); }
        .badge-tp { background: rgba(0,255,157,0.12); color: var(--green); }
        .badge-sl { background: rgba(255,30,86,0.12); color: var(--red); }

        .mono { font-family: var(--mono); }

        /* === Scrollbar === */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2B2F3A; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #434651; }

        /* === Pulse animation === */
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .pulse { animation: pulse 2s ease-in-out infinite; }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="logo">SMC</div>
        <a href="/" class="nav-item {% if active_page == 'chart' %}active{% endif %}">
            <span class="material-icons-round">candlestick_chart</span>
            <span class="tooltip">Chart</span>
        </a>
        <a href="/signals" class="nav-item {% if active_page == 'signals' %}active{% endif %}">
            <span class="material-icons-round">show_chart</span>
            <span class="tooltip">Signals</span>
        </a>
        <a href="/patterns" class="nav-item {% if active_page == 'patterns' %}active{% endif %}">
            <span class="material-icons-round">hub</span>
            <span class="tooltip">Patterns</span>
        </a>
        <a href="/analytics" class="nav-item {% if active_page == 'analytics' %}active{% endif %}">
            <span class="material-icons-round">analytics</span>
            <span class="tooltip">Analytics</span>
        </a>
    </nav>

    <!-- Main Content -->
    <div class="main-wrapper">
        <!-- TradingView Ticker Tape Widget BEGIN -->
        <div class="tradingview-widget-container" style="height: 34px; border-bottom: 1px solid var(--border); background: var(--surface);">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/tv-widget-ticker-tape.js" async>
            {
                "symbols": [
                    { "proName": "FX_IDC:EURUSD", "title": "EUR/USD" },
                    { "proName": "OANDA:XAUUSD", "title": "Gold" },
                    { "proName": "FX_IDC:GBPUSD", "title": "GBP/USD" },
                    { "proName": "FX_IDC:USDJPY", "title": "USD/JPY" },
                    { "proName": "BINANCE:BTCUSDT", "title": "Bitcoin" }
                ],
                "showSymbolLogo": true,
                "isTransparent": true,
                "displayMode": "regular",
                "colorTheme": "dark",
                "locale": "en"
            }
            </script>
        </div>
        <!-- TradingView Ticker Tape Widget END -->

        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="header-title">XGB-SMC<span>v3.0</span></div>
                <select id="pairSelect">
                    <option value="EURUSD">EURUSD</option>
                    <option value="XAUUSD">XAUUSD</option>
                    <option value="GBPUSD">GBPUSD</option>
                </select>
                <select id="timeframeSelect">
                    <option value="1H" selected>1H</option>
                    <option value="4H">4H</option>
                    <option value="1D">1D</option>
                </select>
            </div>
            <div class="header-left" style="gap: 12px;">
                <div style="text-align:right;">
                    <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;">Model</div>
                    <div class="mono" style="font-size:11px;color:var(--blue);">XGBoost</div>
                </div>
                <button class="btn-sync" onclick="forceSync(this)">Force Sync</button>
            </div>
        </header>

        <!-- Page Content -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>

    {% block scripts %}{% endblock %}
    <script>
        async function forceSync(btn) {
            const originalText = btn.innerText;
            btn.innerText = 'SYNCING...';
            btn.style.opacity = '0.7';
            btn.disabled = true;
            
            try {
                await fetch('/api/sync', { method: 'POST' });
                alert('Background Sync Started! The database is fetching new live data and running the ML models. It will take ~1 minute to complete. The dashboard will automatically reflect the changes on the next auto-refresh.');
            } catch(e) {
                alert('Failed to start sync');
            }
            
            btn.innerText = originalText;
            btn.style.opacity = '1';
            btn.disabled = false;
        }
    </script>
</body>
</html>
